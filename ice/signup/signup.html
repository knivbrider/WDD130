<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #closeBtn {
            margin: 10px;
        }

        #formContainer {
            background-image: url(images/jesus_feeds_5000.jpg);
            margin: 50px auto;
            border: 5px solid darkblue;
            border-radius: 5%;
            width: 400px;
            overflow: hidden;
        }

        #top-div {
            height: 150px;
            place-content: end center;
            place-items:  center;
        }

        #top-div h1, #top-div h2 {
            color: white;
            text-shadow: 2px 2px black;
            margin-bottom: 5px;
        }

        #mid-div {
            background-color: white;
            padding: 10px;
            place-content: center;
            place-items: center;
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        #myForm label, #myForm input {
            margin: 9px;
        }

        #news-sect, #cond-sect, #submit {
            place-self: center;
            grid-column: 1/3;
        }

        #submit {
            margin: 12px;
        }

        #foot-div {
            display: flex;
            justify-content: space-between;
            background-color: white;
        }

        #foot-div img {
            max-width: 75px;
        }


    </style>




</head>

<body>
    <div id="formContainer">
        <button type="button" id="closeBtn">X</button>

        <div id="top-div">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>

        <div id="mid-div">

            <h3>Sign Up for Daily Scripture Feed</h3>

            <form id="myForm">
                
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section id="news-sect">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section id="cond-sect">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section id="submit">
                    <button type="submit">Submit</button>
                </section>
            </form>
        </div>

        <div id="foot-div">
            <img src="images/old_testament.webp" alt="old_testament" id="old_testament">
            <img src="images/new_testament.webp" alt="new_testament" id="new_testament">
            <img src="images/book_of_mormon.webp" alt="book_of_mormon" id="book_of_mormon">
            <img src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants" id="doctrine_and_covenants">
            <img src="images/pearl_of_great_price.webp" alt="pearl_of_great_price" id="pearl_of_great_price">
        </div>

    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
